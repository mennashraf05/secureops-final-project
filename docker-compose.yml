services:
  nginx:
    image: nginx:1.27-alpine
    container_name: secureops-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - auth-service
      - inventory-service
      - order-service
      - file-service
      - report-service
      - audit-service
    networks:
      - secureops-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secureops-frontend
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT}
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    expose:
      - "5173"
    networks:
      - secureops-network

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: secureops-auth-service
    env_file:
      - .env
    environment:
      EMAIL_DEV_MODE: ${EMAIL_DEV_MODE}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_REDIRECT_TO: ${SMTP_REDIRECT_TO}
      APP_BASE_URL: ${APP_BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI:-http://localhost:8080/auth/oauth/github/callback}
      AUTH_SEED_ADMIN_NAME: ${AUTH_SEED_ADMIN_NAME}
      AUTH_SEED_ADMIN_EMAIL: ${AUTH_SEED_ADMIN_EMAIL}
      AUTH_SEED_ADMIN_PASSWORD: ${AUTH_SEED_ADMIN_PASSWORD}
    expose:
      - "8000"
    depends_on:
      - postgres
    networks:
      - secureops-network

  inventory-service:
    build:
      context: ./backend
      dockerfile: inventory-service/Dockerfile
    container_name: secureops-inventory-service
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      - postgres
    networks:
      - secureops-network

  order-service:
    build:
      context: ./backend
      dockerfile: order-service/Dockerfile
    container_name: secureops-order-service
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - secureops-network

  file-service:
    build:
      context: ./backend
      dockerfile: file-service/Dockerfile
    container_name: secureops-file-service
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      - postgres
    volumes:
      - file-storage:/app/file-service/storage
    networks:
      - secureops-network

  report-service:
    build:
      context: ./backend
      dockerfile: report-service/Dockerfile
    container_name: secureops-report-service
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      - postgres
      - rabbitmq
    volumes:
      - worker-reports:/app/reports:ro
    networks:
      - secureops-network

  audit-service:
    build:
      context: ./backend
      dockerfile: audit-service/Dockerfile
    container_name: secureops-audit-service
    env_file:
      - .env
    environment:
      TELEGRAM_NOTIFICATIONS_ENABLED: ${TELEGRAM_NOTIFICATIONS_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
    expose:
      - "8000"
    depends_on:
      - postgres
    networks:
      - secureops-network

  worker-service:
    build:
      context: ./backend
      dockerfile: worker-service/Dockerfile
    container_name: secureops-worker-service
    env_file:
      - .env
    depends_on:
      - postgres
      - rabbitmq
    volumes:
      - worker-reports:/app/reports
    networks:
      - secureops-network

  postgres:
    image: postgres:16
    container_name: secureops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
   
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - secureops-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: secureops-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-${RABBITMQ_USER}}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-${RABBITMQ_PASSWORD}}
    ports:
      - "127.0.0.1:15673:15672"
    expose:
      - "5672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - secureops-network

networks:
  secureops-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  file-storage:
  frontend-node-modules:
  worker-reports:
