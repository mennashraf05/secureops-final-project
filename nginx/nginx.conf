events {}

http {
    limit_req_zone $binary_remote_addr zone=secureops_api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=secureops_auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=secureops_auth_strict:10m rate=5r/m;
    limit_req_status 429;

    upstream frontend_app {
        server frontend:5173;
    }

    upstream auth_api {
        server auth-service:8000;
    }

    upstream inventory_api {
        server inventory-service:8000;
    }

    upstream order_api {
        server order-service:8000;
    }

    upstream file_api {
        server file-service:8000;
    }

    upstream report_api {
        server report-service:8000;
    }

    upstream audit_api {
        server audit-service:8000;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /auth/health {
            proxy_pass http://auth_api/auth/health;
        }

        location = /products/health {
            proxy_pass http://inventory_api/products/health;
        }

        location = /orders/health {
            proxy_pass http://order_api/orders/health;
        }

        location = /files/health {
            proxy_pass http://file_api/files/health;
        }

        location = /reports/health {
            proxy_pass http://report_api/reports/health;
        }

        location = /audit/health {
            proxy_pass http://audit_api/audit/health;
        }

        location = /auth/login {
            limit_req zone=secureops_auth burst=5 nodelay;
            proxy_pass http://auth_api/auth/login;
        }

        location = /auth/register {
            limit_req zone=secureops_auth burst=5 nodelay;
            proxy_pass http://auth_api/auth/register;
        }

        location = /auth/verify-email {
            limit_req zone=secureops_auth_strict burst=3 nodelay;
            proxy_pass http://auth_api/auth/verify-email;
        }

        location = /auth/resend-verification {
            limit_req zone=secureops_auth_strict burst=2 nodelay;
            proxy_pass http://auth_api/auth/resend-verification;
        }

        location = /auth/2fa/verify {
            limit_req zone=secureops_auth_strict burst=3 nodelay;
            proxy_pass http://auth_api/auth/2fa/verify;
        }

        location /auth/ {
            limit_req zone=secureops_auth burst=10 nodelay;
            proxy_pass http://auth_api/auth/;
        }

        location = /products {
            limit_req zone=secureops_api burst=20 nodelay;
            proxy_pass http://inventory_api;
        }

        location /products/ {
            limit_req zone=secureops_api burst=20 nodelay;
            proxy_pass http://inventory_api/products/;
        }

        location = /orders {
            limit_req zone=secureops_api burst=20 nodelay;
            proxy_pass http://order_api;
        }

        location /orders/ {
            limit_req zone=secureops_api burst=20 nodelay;
            proxy_pass http://order_api/orders/;
        }

        location = /files {
            limit_req zone=secureops_api burst=20 nodelay;
            proxy_pass http://file_api/files;
        }

        location /files/ {
            limit_req zone=secureops_api burst=20 nodelay;
            proxy_pass http://file_api/files/;
        }

        location = /reports {
            limit_req zone=secureops_api burst=20 nodelay;
            proxy_pass http://report_api/reports;
        }

        location /reports/ {
            limit_req zone=secureops_api burst=20 nodelay;
            proxy_pass http://report_api/reports/;
        }

        location = /audit {
            limit_req zone=secureops_api burst=20 nodelay;
            proxy_pass http://audit_api/audit;
        }

        location /audit/ {
            limit_req zone=secureops_api burst=20 nodelay;
            proxy_pass http://audit_api/audit/;
        }

        location /security/ {
            limit_req zone=secureops_api burst=20 nodelay;
            proxy_pass http://audit_api/security/;
        }

        location / {
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_pass http://frontend_app;
        }
    }
}
